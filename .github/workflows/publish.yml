name: Publish to npm

on:
  release:
    types: [published]
  # workflow_dispatch lets operators dry-run the test matrix + gate
  # wiring without cutting a real release. The npm publish step is
  # guarded against non-release triggers below.
  workflow_dispatch:

jobs:
  # Mirror test.yml's Node matrix on the tagged commit before publish.
  # Previously publish.yml only ran `npm test` once on Node 20, so a
  # regression on Node 18 or 22 could ship to npm unnoticed. npm
  # versions are immutable (only superceded), so catching it here is
  # cheap compared to publishing a broken version.
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npx tsup

      - name: Publish to npm
        # Only publish on an actual release event. workflow_dispatch
        # runs through test+build as a dry run but must not upload.
        #
        # Auth: NPM_TOKEN secret. The Trusted Publisher (OIDC) config at
        #   https://www.npmjs.com/package/@sharp-api/client/access
        # was returning 404 on PUT for v0.2.5 (silent permission denial),
        # so we fall back to the long-lived NPM_TOKEN. Re-enable OIDC by
        # confirming the Trusted Publisher binding still maps to this
        # workflow filename + repo + ref pattern after any rename.
        # --provenance still emits the SLSA attestation either way.
        if: github.event_name == 'release'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
